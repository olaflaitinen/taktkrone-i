# TAKTKRONE-I LoRA Baseline Training Configuration
# Use this as a starting point for training experiments

experiment_id: "exp_baseline_001"
experiment_name: "lora_llama3_8b_v0.2_baseline"
description: "Baseline LoRA fine-tuning of Llama 3.1 8B on OCC corpus v0.2"
tags: ["baseline", "lora", "llama3"]

method: "lora"

model:
  model_id: "meta-llama/Llama-3.1-8B-Instruct"
  model_type: "pretrained"
  torch_dtype: "auto"
  trust_remote_code: false

hyperparameters:
  learning_rate: 2.0e-4
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  optimizer: "adamw_8bit"
  lr_scheduler_type: "cosine"
  max_seq_length: 4096
  eval_steps: 500
  save_steps: 500
  logging_steps: 10
  eval_strategy: "steps"
  save_strategy: "steps"
  save_total_limit: 3
  fp16: false
  bf16: true
  gradient_checkpointing: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

dataset:
  train_path: "data/train/occ_corpus_v0.2.jsonl"
  eval_path: "data/eval/occ_corpus_v0.2_val.jsonl"
  dataset_version: "0.2.0"
  chat_template: "chatml"
  add_eos: true
  packing: true
  shuffle: true
  seed: 42

output_dir: "models/experiments"

use_wandb: false
wandb_project: "taktkrone-i"
use_mlflow: false

seed: 42
