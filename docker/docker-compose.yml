version: '3.8'

services:
  # API serving service
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: serving
    image: taktkrone:serving
    container_name: taktkrone-api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    environment:
      - DEVICE=cuda
      - LOG_LEVEL=INFO
      - ENABLE_RAG=true
      - ENABLE_GUARDRAILS=true
    env_file:
      - ../.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://taktkrone.ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Gradio demo UI
  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: demo
    image: taktkrone:demo
    container_name: taktkrone-demo
    ports:
      - "7860:7860"
    volumes:
      - ../models:/app/models:ro
      - ../configs:/app/configs:ro
    environment:
      - DEVICE=cuda
      - API_URL=http://api:8000
    env_file:
      - ../.env
    depends_on:
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: taktkrone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant vector database (optional, for RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: taktkrone-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: taktkrone-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: taktkrone-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: taktkrone-network
